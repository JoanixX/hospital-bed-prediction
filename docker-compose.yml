version: "3.9"

services:
  # Clúster de cómputo concurrente (PC3).
  cluster:
    build: .
    container_name: hbp_cluster
    ports:
      - "6060:6060"   # pprof
    command: ["-workers=8", "-synthetic=1000000", "-pprof=:6060"]
    volumes:
      - ./data:/app/data:ro
    restart: "no"

